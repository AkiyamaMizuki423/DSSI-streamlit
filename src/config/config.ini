[Directories]
models = models
metadata = metadata

[Model]
name = loan_approval_decision_tree
features = dep_cat,loan_term,cibil_score,log_residential_assets_value,log_loan_amount
categorical_features = dep_cat
numerical_features = loan_term,cibil_score,log_residential_assets_value,log_loan_amount
label = approved
test_size = 0.2

[Hyperparameters]
dt_max_depth = 6
dt_min_samples_split = 20
dt_class_weight = balanced
dt_random_state = 0

[Evaluation]
fdr = 0.05
recall = 0.8
